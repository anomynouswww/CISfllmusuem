<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Page</title>
    <style>
     
     
   
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: url('https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
    background-size: cover;
}




        header {
            background: #222;
            color: white;
            padding: 20px;
            text-align: center;
        }




        h1 {
            margin: 0;
            font-size: 40px;
            letter-spacing: 2px;
        }




        nav {
            background: #444;
            padding: 10px;
            text-align: center;
        }




        nav a {
            color: white;
            text-decoration: none;
            margin: 10px;
            padding: 10px 15px;
            display: inline-block;
            background: #666;
            border-radius: 5px;
            font-weight: bold;
        }




        nav a:hover {
            background: #ff9800;
        }




        main {
            padding: 40px;
            text-align: center;
        }




        .card {
    background: rgba(20, 20, 20, 0.7); /* dark glass effect */
    color: white;
    padding: 20px;
    margin: 15px auto;
    width: 60%;
    border-radius: 15px;
    backdrop-filter: blur(8px); /* glass blur */
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}


        footer {
          background: rgba(20, 20, 20, 0.7); /* dark glass effect */
    color: white;
    padding: 20px;
    margin: 15px auto;
    width: 60%;
    border-radius: 15px;
    backdrop-filter: blur(8px); /* glass blur */
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>




<header>
    <h1>Contact Page</h1>
</header>









<main>
    <div class="card">
        <h2>This is how to contact us </h2>
        <p>----------@gmail.com</p>
    </div>






<footer>
    <p>©  fll 2026 Museum</p>
</footer>




</body>
</html>
