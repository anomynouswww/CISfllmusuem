<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>animation page </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }


        header {
            background: #222;
            color: white;
            padding: 20px;
            text-align: center;
        }


        h1 {
            margin: 0;
            font-size: 40px;
            letter-spacing: 2px;
        }


        nav {
            background: #444;
            padding: 10px;
            text-align: center;
        }


        nav a {
            color: white;
            text-decoration: none;
            margin: 10px;
            padding: 10px 15px;
            display: inline-block;
            background: #666;
            border-radius: 5px;
            font-weight: bold;
        }


        nav a:hover {
            background: #ff9800;
        }


        main {
            padding: 40px;
            text-align: center;
        }


        .card {
            background: white;
            padding: 20px;
            margin: 15px auto;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }


        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 30px;
        }
    </style>
</head>
<body>


<header>

</header>








<footer>
