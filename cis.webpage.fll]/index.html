<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CIS FLL Links Museum</title>

    <style>
        /* ===== BODY (Animated Background) ===== */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            color: white;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #000000);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== PARTICLES ===== */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particles::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveParticles 20s linear infinite;
            opacity: 0.15;
        }

        @keyframes moveParticles {
            from { transform: translate(0, 0); }
            to { transform: translate(-50px, -50px); }
        }

        /* ===== HEADER ===== */
        header {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        h1 {
            margin: 0;
            font-size: 40px;
            letter-spacing: 2px;
        }

        /* ===== NAV ===== */
        nav {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            text-align: center;
            backdrop-filter: blur(6px);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 10px;
            padding: 10px 15px;
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            background: #ff9800;
            transform: scale(1.1);
        }

        /* ===== MAIN ===== */
        main {
            padding: 40px;
            text-align: center;
        }

        /* ===== CARDS ===== */
        .card {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            margin: 15px auto;
            width: 60%;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* ===== FOOTER ===== */
        footer {
            background: rgba(0, 0, 0, 0.6);
            text-align: center;
            padding: 10px;
            margin-top: 30px;
            backdrop-filter: blur(6px);
        }
    </style>
</head>

<body>

<!-- PARTICLES -->
<div class="particles"></div>

<header>
    <h1>CIS FLL MUSEUM</h1>
</header>

<nav>
    <a href="page1.html">Animations</a>
    <a href="page2.html">African History</a>
    <a href="page3.html">Trips</a>
    <a href="page4.html">Pictures</a>
    <a href="page5.html">Members</a>
    <a href="page6.html">Contact</a>
</nav>

<main>
    <div class="card">
        <h2>Welcome to the CIS FLL Museum</h2>
        <p>This is the main page. Explore different sections about African ancestry.</p>
    </div>

    <div class="card">
        <h2>Discover Art & History</h2>
        <p>You can edit this content however you like.</p>
    </div>
</main>

<footer>
    <p>© FLL 2026 Museum</p>
</footer>

</body>
</html>
